services:
  - type: web
    name: socialapp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: socialapp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: socialapp-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: socialapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: socialapp-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: socialapp-db
          property: database
      - key: REDIS_HOST
        fromService:
          name: socialapp-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: socialapp-redis
          type: redis
          property: port
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: socialapp-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3001
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: redis
    name: socialapp-redis
    plan: free
    ipAllowList: []

databases:
  - name: socialapp-db
    plan: free
    databaseName: socialapp
    user: socialapp